name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Before You Submit
        - Check [existing issues](https://github.com/banter240/tado_hijack/issues) and [discussions](https://github.com/banter240/tado_hijack/discussions) - someone might have already requested this.
        - Join [Discord](https://discord.gg/kxUsjHyxfT) to discuss ideas or post suggestions - we have a dedicated suggestions channel there.

  - type: dropdown
    id: generation
    attributes:
      label: Relevant Tado Generation
      description: Which generation is this feature relevant for?
      options:
        - V2 - GW Bridge
        - V3 Classic - Internet Bridge IB01 (HomeKit)
        - Tado X - Internet Bridge IB02 (Matter)
        - All generations
        - Not generation-specific
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What Problem Does This Solve?
      description: Describe the use case or limitation you're running into. The more concrete, the better.
      placeholder: "e.g. I want to automate X but currently there's no way to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds you've tried, or other approaches that could solve this?
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, links, API responses, or anything else that helps illustrate the request.
    validations:
      required: false
